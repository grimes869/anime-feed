<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAL News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    /*
      Everything is sized in vw units so the entire widget scales
      proportionally as the embed width changes in Notion.
      Base assumption: 4 cards across, image ~14vw tall.
      At 100vw wide: card ≈ 25vw, image ≈ 14vw (roughly 16:9 of a 25vw card).
    */
    :root {
      --surface: #f7f7f5;
      --surface-hover: #f0f0ec;
      --border: #e8e8e4;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b65;
      --text-meta: #9b9b93;
      --accent: #2b5ce6;
      --accent-soft: #eef2fd;
      --shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.06), 0 0.4vw 1.2vw rgba(0,0,0,0.04);
      --shadow-hover: 0 0.2vw 0.8vw rgba(0,0,0,0.08), 0 0.8vw 2.4vw rgba(0,0,0,0.06);
      --radius: 1vw;
      --img-bg: #e8e8e4;
      --dot: rgba(255,255,255,0.45);
      --dot-active: rgba(255,255,255,0.95);
      --btn-bg: rgba(255,255,255,0.92);
      --btn-border: rgba(0,0,0,0.08);
      --btn-shadow: 0 0.2vw 0.8vw rgba(0,0,0,0.12);
      --gap: 0.8vw;
      --pad: 1vw;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #222220;
        --surface-hover: #2a2a28;
        --border: #2e2e2c;
        --text-primary: #f0f0ec;
        --text-secondary: #9b9b93;
        --text-meta: #6b6b65;
        --accent: #6b8ef5;
        --accent-soft: #1e2540;
        --shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.3), 0 0.4vw 1.2vw rgba(0,0,0,0.2);
        --shadow-hover: 0 0.2vw 0.8vw rgba(0,0,0,0.4), 0 0.8vw 2.4vw rgba(0,0,0,0.3);
        --img-bg: #2a2a28;
        --dot: rgba(255,255,255,0.3);
        --dot-active: rgba(255,255,255,0.9);
        --btn-bg: rgba(34,34,32,0.92);
        --btn-border: rgba(255,255,255,0.08);
        --btn-shadow: 0 0.2vw 0.8vw rgba(0,0,0,0.4);
      }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #8c8c8c;
      font-family: 'Outfit', sans-serif;
      color: var(--text-primary);
      /* Base font size scales with viewport width */
      font-size: 1.3vw;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body {
      padding: var(--pad);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Carousel ── */
    .carousel {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .carousel-viewport {
      overflow: hidden;
      width: 100%;
      border-radius: var(--radius);
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .carousel-track {
      display: flex;
      width: 300%; /* overridden by JS */
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .carousel-page {
      display: grid;
      gap: var(--gap);
      align-items: stretch;
      height: 100%;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      height: 100%;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-0.2vw);
      background: var(--surface-hover);
    }

    .card-image-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: var(--img-bg);
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
      display: block;
    }

    .card:hover .card-image-wrap img { transform: scale(1.04); }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-image-placeholder svg { opacity: 0.2; width: 2vw; height: 2vw; }

    /* Text overlay sits at bottom of image */
    .card-body {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5vw 1vw 0.8vw;
      display: flex;
      flex-direction: column;
      gap: 0.3vw;
      /* Gradient backdrop for readability */
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
    }

    .card-meta { display: flex; align-items: center; gap: 0.4vw; }

    .card-source {
      font-size: 0.75vw;
      font-weight: 600;
      letter-spacing: 0.06vw;
      text-transform: uppercase;
      color: #fff;
      background: rgba(255,255,255,0.2);
      padding: 0.15vw 0.5vw;
      border-radius: 0.3vw;
      backdrop-filter: blur(4px);
    }

    .card-date { font-size: 0.8vw; color: rgba(255,255,255,0.7); }

    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.1vw;
      font-weight: 300;
      line-height: 1.35;
      color: #ffffff;
      letter-spacing: -0.01vw;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .card-desc {
      font-size: 0.85vw;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 300;
    }

    /* ── Nav buttons ── */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 2.2vw;
      height: 2.2vw;
      border-radius: 50%;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      box-shadow: var(--btn-shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .carousel-btn:hover { transform: translateY(-50%) scale(1.1); }
    .carousel-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
    .carousel-btn svg {
      width: 1vw; height: 1vw;
      stroke: var(--text-primary); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .carousel-btn-prev { left: -0.5vw; }
    .carousel-btn-next { right: -0.5vw; }

    /* ── Overlay controls ── */
    .carousel-controls {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 2.5vw;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6vw;
      background: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 100%);
      border-radius: 0 0 var(--radius) var(--radius);
      pointer-events: none;
      z-index: 5;
    }

    .carousel-dots {
      display: flex;
      align-items: center;
      gap: 0.4vw;
      pointer-events: all;
    }

    .dot {
      width: 0.4vw; height: 0.4vw;
      border-radius: 0.2vw;
      background: var(--dot);
      border: none;
      cursor: pointer;
      transition: background 0.25s, width 0.25s;
      padding: 0;
    }

    .dot.active { background: var(--dot-active); width: 1.2vw; }

    .btn-pause {
      width: 1.5vw; height: 1.5vw;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .btn-pause:hover { background: rgba(255,255,255,0.35); }
    .btn-pause svg { width: 0.6vw; height: 0.6vw; fill: rgba(255,255,255,0.9); stroke: none; }

    /* ── Skeleton ── */
    .skeleton-page {
      display: grid;
      gap: var(--gap);
      width: 100%;
    }

    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .skeleton-img {
      width: 100%; height: 12vw;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-body { padding: 0.7vw 0.9vw; display: flex; flex-direction: column; gap: 0.5vw; }

    .skeleton-line {
      height: 0.7vw; border-radius: 0.3vw;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-state {
      text-align: center; padding: 4vw 0;
      color: var(--text-meta); font-size: 1.1vw;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(0.5vw); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="carousel" id="carousel">
    <button class="carousel-btn carousel-btn-prev" id="btn-prev" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="carousel-viewport" id="carousel-viewport">
      <div class="carousel-track" id="carousel-track">
        <div class="skeleton-page" style="grid-template-columns: repeat(3, 1fr);">
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line" style="width:40%"></div><div class="skeleton-line" style="width:75%"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line" style="width:40%"></div><div class="skeleton-line" style="width:75%"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line" style="width:40%"></div><div class="skeleton-line" style="width:75%"></div></div></div>
        </div>
      </div>

      <div class="carousel-controls">
        <div class="carousel-dots" id="carousel-dots"></div>
        <button class="btn-pause" id="btn-pause" aria-label="Pause">
          <svg id="pause-icon" viewBox="0 0 8 10"><rect x="0" y="0" width="3" height="10" rx="1"/><rect x="5" y="0" width="3" height="10" rx="1"/></svg>
          <svg id="play-icon" viewBox="0 0 10 10" style="display:none"><polygon points="0,0 10,5 0,10"/></svg>
        </button>
      </div>
    </div>

    <button class="carousel-btn carousel-btn-next" id="btn-next" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <script>
    const MAX_ITEMS = 12;
    const PER_PAGE  = 3;


    async function fetchWithFallback() {
      const response = await fetch('/api/feed');
      if (!response.ok) throw new Error('Feed fetch failed');
      const text = await response.text();
      if (!text.includes('<item>')) throw new Error('Invalid feed');
      return text;
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function extractImage(item) {
      const MRSS = 'http://search.yahoo.com/mrss/';
      const thumb = item.getElementsByTagNameNS(MRSS, 'thumbnail')[0];
      if (thumb) return thumb.getAttribute('url') || thumb.textContent.trim();
      const mc = item.getElementsByTagNameNS(MRSS, 'content')[0];
      if (mc?.getAttribute('url')) return mc.getAttribute('url');
      const enc = item.querySelector('enclosure');
      if (enc?.getAttribute('url')) return enc.getAttribute('url');
      const dt = item.querySelector('description')?.textContent || '';
      const frag = document.createElement('div');
      frag.innerHTML = dt;
      const img = frag.querySelector('img');
      if (img?.getAttribute('src')) return img.getAttribute('src');
      return null;
    }

    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html;
      return d.textContent || d.innerText || '';
    }

    function buildCard(item, idx) {
      const title  = item.querySelector('title')?.textContent?.trim() || 'Untitled';
      const link   = item.querySelector('link')?.textContent?.trim() || '#';
      const date   = formatDate(item.querySelector('pubDate')?.textContent?.trim());
      const desc   = stripHtml(item.querySelector('description')?.textContent || '').replace(/\s+/g, ' ').trim();
      const imgUrl = extractImage(item);

      const imgHtml = imgUrl
        ? `<img src="${imgUrl}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-image-placeholder\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'></rect><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'></circle><path d=\\'M21 15l-5-5L5 21\\'></path></svg></div>'" />`
        : `<div class="card-image-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg></div>`;

      return `<a class="card" href="${link}" target="_blank" rel="noopener noreferrer"
                 style="animation: cardIn 0.4s ease ${idx * 0.07}s both">
        <div class="card-image-wrap">${imgHtml}</div>
        <div class="card-body">
          <div class="card-meta">
            <span class="card-source">MAL</span>
            ${date ? `<span class="card-date">${date}</span>` : ''}
          </div>
          <div class="card-title">${title}</div>
          ${desc ? `<div class="card-desc">${desc.slice(0, 180)}</div>` : ''}
        </div>
      </a>`;
    }

    let currentPage = 0;
    let totalPages  = 0;
    let autoTimer   = null;
    let isPaused    = false;

    const track     = document.getElementById('carousel-track');
    const dotsWrap  = document.getElementById('carousel-dots');
    const btnPrev   = document.getElementById('btn-prev');
    const btnNext   = document.getElementById('btn-next');
    const btnPause  = document.getElementById('btn-pause');
    const pauseIcon = document.getElementById('pause-icon');
    const playIcon  = document.getElementById('play-icon');

    function goTo(page) {
      currentPage = Math.max(0, Math.min(page, totalPages - 1));
      const pct = currentPage * (100 / totalPages);
      track.style.transform = `translateX(-${pct}%)`;
      dotsWrap.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentPage));
      btnPrev.disabled = currentPage === 0;
      btnNext.disabled = currentPage === totalPages - 1;
    }

    function startAuto() {
      clearInterval(autoTimer);
      if (!isPaused) {
        autoTimer = setInterval(() => goTo(currentPage < totalPages - 1 ? currentPage + 1 : 0), 5000);
      }
    }

    function togglePause() {
      isPaused = !isPaused;
      pauseIcon.style.display = isPaused ? 'none' : '';
      playIcon.style.display  = isPaused ? '' : 'none';
      isPaused ? clearInterval(autoTimer) : startAuto();
    }

    btnPrev.addEventListener('click', () => { goTo(currentPage - 1); startAuto(); });
    btnNext.addEventListener('click', () => { goTo(currentPage + 1); startAuto(); });
    btnPause.addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });

    const carousel = document.getElementById('carousel');
    carousel.addEventListener('mouseenter', () => { if (!isPaused) clearInterval(autoTimer); });
    carousel.addEventListener('mouseleave', () => { if (!isPaused) startAuto(); });

    async function loadFeed() {
      try {
        const text = await fetchWithFallback();
        const parser = new DOMParser();
        const xml   = parser.parseFromString(text, 'text/xml');
        const items = Array.from(xml.querySelectorAll('item')).slice(0, MAX_ITEMS);
        if (!items.length) throw new Error('No items');

        const pages = [];
        for (let i = 0; i < items.length; i += PER_PAGE) {
          pages.push(items.slice(i, i + PER_PAGE));
        }
        totalPages = pages.length;

        track.style.width = `${totalPages * 100}%`;

        track.innerHTML = pages.map((pageItems, pi) => `
          <div class="carousel-page" style="flex: 0 0 calc(100% / ${totalPages}); grid-template-columns: repeat(${PER_PAGE}, 1fr);">
            ${pageItems.map((item, ci) => buildCard(item, pi * PER_PAGE + ci)).join('')}
          </div>`
        ).join('');

        dotsWrap.innerHTML = pages.map((_, i) =>
          `<button class="dot${i === 0 ? ' active' : ''}" aria-label="Page ${i+1}"></button>`
        ).join('');
        dotsWrap.querySelectorAll('.dot').forEach((dot, i) => {
          dot.addEventListener('click', () => { goTo(i); startAuto(); });
        });

        goTo(0);
        startAuto();

      } catch(err) {
        console.error(err);
        document.getElementById('carousel-viewport').innerHTML = `
          <div class="error-state">Unable to load feed.<br/>
            <a href="https://myanimelist.net/news" target="_blank" rel="noopener"
               style="color:var(--accent);text-decoration:none;">Visit MAL News →</a>
          </div>`;
      }
    }

    loadFeed();

    // Reflow carousel position whenever the iframe is resized by Notion
    // CSS vw units recalculate automatically; we just need to re-fire goTo
    // so the JS-driven translateX stays in sync
    window.addEventListener('resize', () => {
      if (totalPages > 0) goTo(currentPage);
    });
  </script>
</body>
</html>
